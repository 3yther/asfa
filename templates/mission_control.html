<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1923">
<title>ASFA · MISSION CONTROL</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  :root{
    --bg:#0f1923; --card:#111827; --border:#1e2a3a;
    --green:#10b981; --amber:#f59e0b; --purple:#7c3aed;
    --red:#ef4444; --text:#cbd5e1; --muted:#64748b; --cyan:#22d3ee;
    --crit:#ef4444; --high:#f59e0b; --med:#eab308; --low:#10b981;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{color-scheme:dark;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
    min-height:100vh; padding-bottom:40px; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--cyan);text-decoration:none;}
  .muted{color:var(--muted);}
  .mono{font-variant-numeric:tabular-nums;}

  /* ── Top bar ────────────────────────────────────────────────────────── */
  .topbar{
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:14px 22px; background:#0b131c;
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;
  }
  .topbar .title{font-size:1rem; font-weight:700; letter-spacing:3px; color:#e2e8f0;}
  .topbar .title b{color:var(--green);}
  .topbar .spacer{flex:1;}
  .stat{
    display:flex; flex-direction:column; align-items:flex-end; line-height:1.2;
  }
  .stat .k{font-size:.55rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase;}
  .stat .v{font-size:.95rem; font-weight:700;}
  .stat .v.xp{color:var(--purple);}
  .stat .v.agents{color:var(--green);}
  .home-link{font-size:.6rem;letter-spacing:2px;border:1px solid var(--border);
    padding:6px 10px;border-radius:6px;color:var(--muted);}
  .home-link:hover{border-color:var(--cyan);color:var(--cyan);}

  /* ── Alert banner ───────────────────────────────────────────────────── */
  .alerts{display:flex; flex-direction:column; gap:6px; padding:12px 22px 0;}
  .alert{
    display:flex; align-items:center; gap:10px;
    padding:9px 14px; border-radius:8px; font-size:.72rem; letter-spacing:.5px;
    border:1px solid var(--border); background:var(--card);
  }
  .alert .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;
    animation:pulse 1.8s ease-in-out infinite;}
  .alert.warn{border-color:rgba(245,158,11,.4);} .alert.warn .dot{background:var(--amber);}
  .alert.crit{border-color:rgba(239,68,68,.45);} .alert.crit .dot{background:var(--red);}
  .alert.info{border-color:rgba(124,58,237,.45);} .alert.info .dot{background:var(--purple);}
  .alert .tag{font-size:.55rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  @keyframes pulse{50%{opacity:.3;}}

  /* ── Layout ─────────────────────────────────────────────────────────── */
  .layout{display:grid; grid-template-columns:1fr 320px; gap:16px; padding:16px 22px;}
  @media(max-width:920px){ .layout{grid-template-columns:1fr;} }

  .panel{background:var(--card); border:1px solid var(--border); border-radius:12px;}
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:1px solid var(--border);
  }
  .panel-head h2{font-size:.68rem; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; font-weight:700;}
  .panel-head h2::before{content:"▸ "; color:var(--green);}

  /* ── Map ────────────────────────────────────────────────────────────── */
  .map-wrap{position:relative; width:100%; aspect-ratio:42/23; background:#0c141d;
    border-radius:0 0 12px 12px; overflow:hidden;}
  #phaser-map{position:absolute; inset:0; width:100%; height:100%;}
  #phaser-map canvas{display:block; margin:0 auto;}
  .map-grid{position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(30,42,58,.5) 1px,transparent 1px),
      linear-gradient(90deg,rgba(30,42,58,.5) 1px,transparent 1px);
    background-size:34px 34px;}
  .road{position:absolute; background:#161f2b;}
  .road.h{left:0; right:0; height:8%; top:46%; border-top:1px solid #1e2a3a; border-bottom:1px solid #1e2a3a;}
  .road.v{top:0; bottom:0; width:7%; left:46.5%; border-left:1px solid #1e2a3a; border-right:1px solid #1e2a3a;}
  .road.h::after{content:""; position:absolute; top:50%; left:0; right:0; height:0;
    border-top:2px dashed #2c3b50; transform:translateY(-50%);}
  .road.v::after{content:""; position:absolute; left:50%; top:0; bottom:0; width:0;
    border-left:2px dashed #2c3b50; transform:translateX(-50%);}
  .tree{position:absolute; font-size:1rem; opacity:.55; filter:grayscale(.3); pointer-events:none; user-select:none;}

  .bldg{
    position:absolute; transform:translate(-50%,-50%);
    width:104px; padding:10px 8px 9px; border-radius:10px; cursor:pointer;
    background:#0e1a26; border:1.5px solid var(--border); text-align:center;
    transition:transform .12s ease, box-shadow .2s ease, border-color .2s ease;
  }
  @media(max-width:560px){ .bldg{width:84px;padding:8px 5px;} }
  .bldg:hover{transform:translate(-50%,-50%) scale(1.06); box-shadow:0 8px 26px rgba(0,0,0,.5);}
  .bldg.sel{box-shadow:0 0 0 2px var(--cyan), 0 8px 26px rgba(0,0,0,.5);}
  .bldg .ico{line-height:0; margin-bottom:5px;}
  .bldg .ico .bsvg{width:56px; height:65px; display:block; margin:0 auto;
    transition:filter .25s ease;}
  @media(max-width:560px){ .bldg .ico .bsvg{width:46px;height:54px;} }
  .bldg .nm{font-size:.62rem; letter-spacing:1.5px; font-weight:700; text-transform:uppercase;}
  .bldg .lvl{font-size:.5rem; color:var(--muted); letter-spacing:1px; margin-top:2px;}
  .bldg.active{border-color:var(--green);}
  .bldg.active{animation:bpulse 2.2s ease-in-out infinite;}
  @keyframes bpulse{0%,100%{border-color:rgba(16,185,129,.55);}50%{border-color:rgba(16,185,129,1);}}
  .bldg.locked{opacity:.5; cursor:not-allowed; filter:grayscale(.5);}
  .bldg.locked .nm::after{content:" 🔒"; font-size:.6rem;}

  /* ── Detail panel ───────────────────────────────────────────────────── */
  .detail-body{padding:16px;}
  .d-head{display:flex; align-items:center; gap:14px; margin-bottom:14px;}
  .d-ico{font-size:2.4rem; line-height:0;}
  .d-ico .bsvg{width:52px; height:60px; display:block;}
  .d-name{font-size:1.1rem; font-weight:700; letter-spacing:1px;}
  .d-role{font-size:.66rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;}
  .d-badge{margin-left:auto; font-size:.55rem; letter-spacing:2px; padding:4px 10px; border-radius:20px; text-transform:uppercase;}
  .d-badge.active{background:rgba(16,185,129,.15); color:var(--green); border:1px solid rgba(16,185,129,.4);}
  .d-badge.idle{background:rgba(100,116,139,.12); color:var(--muted); border:1px solid var(--border);}
  .d-badge.locked{background:rgba(239,68,68,.1); color:var(--red); border:1px solid rgba(239,68,68,.3);}

  .xp-row{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .xp-row .lv{font-size:.7rem; color:var(--purple); font-weight:700; letter-spacing:1px;}
  .xp-row .pct{margin-left:auto; font-size:.62rem; color:var(--muted);}
  .xp-bar{height:9px; border-radius:6px; background:#0c141d; border:1px solid var(--border); overflow:hidden;}
  .xp-fill{height:100%; background:linear-gradient(90deg,var(--purple),var(--cyan)); width:0; transition:width .6s cubic-bezier(.25,1,.35,1);}
  .xp-sub{font-size:.58rem; color:var(--muted); margin-top:4px;}

  .grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:16px 0;}
  @media(max-width:560px){ .grid4{grid-template-columns:repeat(2,1fr);} }
  .cell{background:#0c141d; border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center;}
  .cell .k{font-size:.5rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase;}
  .cell .v{font-size:1.05rem; font-weight:700; margin-top:3px;}

  .sub-h{font-size:.58rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin:16px 0 8px;}
  .sub-h::before{content:"// "; color:var(--green);}

  .findings{display:flex; gap:8px; flex-wrap:wrap;}
  .fbadge{font-size:.55rem; letter-spacing:1px; padding:5px 9px; border-radius:6px; font-weight:700;}
  .fbadge .n{margin-left:5px;}
  .fbadge.critical{background:rgba(239,68,68,.14); color:var(--crit); border:1px solid rgba(239,68,68,.4);}
  .fbadge.high{background:rgba(245,158,11,.14); color:var(--high); border:1px solid rgba(245,158,11,.4);}
  .fbadge.medium{background:rgba(234,179,8,.12); color:var(--med); border:1px solid rgba(234,179,8,.35);}
  .fbadge.low{background:rgba(16,185,129,.12); color:var(--low); border:1px solid rgba(16,185,129,.35);}

  .live-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .live-cell{background:#0c141d; border:1px solid rgba(34,211,238,.25); border-radius:8px; padding:10px; text-align:center;}
  .live-cell .k{font-size:.5rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase;}
  .live-cell .v{font-size:1rem; font-weight:700; margin-top:3px;}
  .pos{color:var(--green);} .neg{color:var(--red);}

  .log{display:flex; flex-direction:column; gap:0; max-height:240px; overflow-y:auto;}
  .log-item{display:flex; gap:10px; padding:7px 0; border-bottom:1px solid rgba(30,42,58,.5); font-size:.68rem;}
  .log-item:last-child{border-bottom:none;}
  .log-item .ts{color:var(--muted); font-size:.58rem; white-space:nowrap;}
  .log-item .xp{margin-left:auto; color:var(--purple); font-size:.58rem; white-space:nowrap;}

  .actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:16px;}
  .btn{
    flex:1; min-width:90px; padding:9px 10px; border-radius:8px; cursor:pointer;
    font-family:inherit; font-size:.6rem; letter-spacing:1.5px; font-weight:700;
    text-transform:uppercase; border:1px solid var(--border); background:#0c141d; color:var(--text);
    transition:transform .1s, border-color .2s, background .2s;
  }
  .btn:hover{border-color:var(--cyan);} .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .btn.xp{border-color:rgba(124,58,237,.5); color:#c4b5fd;}
  .btn.battle{border-color:rgba(245,158,11,.5); color:#fcd34d;}
  .btn.deploy{border-color:rgba(16,185,129,.5); color:#6ee7b7;}

  /* ── Missions ───────────────────────────────────────────────────────── */
  .missions{display:flex; flex-direction:column; gap:10px; padding:14px;}
  .mission{
    display:flex; align-items:flex-start; gap:10px;
    background:#0c141d; border:1px solid var(--border); border-radius:10px; padding:11px 12px;
    cursor:pointer; transition:border-color .2s;
  }
  .mission:hover{border-color:var(--cyan);}
  .mission.done{opacity:.6;}
  .mission.done .m-title{text-decoration:line-through; color:var(--muted);}
  .m-check{width:18px; height:18px; border-radius:5px; border:1.5px solid var(--muted);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.7rem; margin-top:1px;}
  .mission.done .m-check{background:var(--green); border-color:var(--green); color:#04110b;}
  .m-title{font-size:.72rem; font-weight:700; letter-spacing:.5px;}
  .m-desc{font-size:.58rem; color:var(--muted); margin-top:3px; line-height:1.4;}
  .m-xp{margin-left:auto; font-size:.58rem; color:var(--purple); font-weight:700; white-space:nowrap;}

  .live-strip{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:14px;}
  .live-strip .live-cell{text-align:left;}

  /* ── Toast ──────────────────────────────────────────────────────────── */
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#0b131c; border:1px solid var(--cyan); border-radius:8px;
    padding:10px 18px; font-size:.66rem; letter-spacing:1px; z-index:200;
    animation:tin .2s ease; text-transform:uppercase; white-space:nowrap;}
  @keyframes tin{from{opacity:0;transform:translate(-50%,8px);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="title">ASFA · <b>MISSION CONTROL</b></div>
  <div class="spacer"></div>
  <div class="stat"><span class="k">Active</span><span class="v agents" id="stat-active">0</span></div>
  <div class="stat"><span class="k">Total XP</span><span class="v xp" id="stat-xp">0</span></div>
  <div class="stat"><span class="k">Time</span><span class="v mono" id="stat-time">--:--:--</span></div>
  <a class="home-link" href="/">⌂ DASH</a>
</div>

<div class="alerts" id="alerts"></div>

<div class="layout">
  <!-- LEFT: map + detail -->
  <div style="display:flex; flex-direction:column; gap:16px; min-width:0;">
    <div class="panel">
      <div class="panel-head">
        <h2>Base Map</h2>
        <span class="muted" style="font-size:.55rem; letter-spacing:1.5px;">CLICK A BUILDING</span>
      </div>
      <div class="map-wrap" id="map">
        <div id="phaser-map"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Agent Detail</h2><span class="muted" id="detail-id" style="font-size:.55rem;letter-spacing:1.5px;"></span></div>
      <div class="detail-body" id="detail">
        <div class="muted" style="font-size:.7rem;">// SELECT AN AGENT FROM THE MAP</div>
      </div>
    </div>
  </div>

  <!-- RIGHT: missions + live -->
  <div style="display:flex; flex-direction:column; gap:16px; min-width:0;">
    <div class="panel">
      <div class="panel-head"><h2>Daily Missions</h2><span class="muted" id="mission-count" style="font-size:.55rem;letter-spacing:1.5px;">0/3</span></div>
      <div class="missions" id="missions"><div class="muted" style="font-size:.7rem;">// LOADING…</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>ASFA Live</h2><span class="muted" id="live-uptime" style="font-size:.55rem;letter-spacing:1.5px;color:var(--green);">●</span></div>
      <div class="live-strip" id="live-strip"></div>
    </div>
  </div>
</div>

<script>
"use strict";

// ── State ────────────────────────────────────────────────────────────────
let AGENTS = [];
let LIVE = {};
let SELECTED = null;
let mapScene = null;          // Phaser scene, set on create()
let pendingAgents = null;     // agent data that arrived before the scene booted
let pendingSelected = null;
const TREES = [
  {x:24,y:20},{x:50,y:18},{x:74,y:22},{x:18,y:42},{x:90,y:44},
  {x:24,y:78},{x:48,y:80},{x:72,y:80},{x:90,y:74},{x:50,y:38},{x:50,y:58}
];

// ── Pixel-art SVG buildings ───────────────────────────────────────────────
// Each agent gets a unique ~60x70 inline-SVG building. Three visual states are
// derived from status (active / idle / locked) via a shared palette so a status
// toggle just re-renders the SVG — no external images, no CDN.
const BUILDING_ACCENTS = {
  nexus:"#22d3ee", sentinel:"#10b981", axiom:"#7c3aed", pyro:"#f59e0b",
  quant:"#3b82f6", ghost:"#ec4899", pixel:"#14b8a6", forge:"#64748b",
  // real Claude Code agents
  oracle:"#818cf8", ledger:"#34d399", "auto-docs":"#fbbf24",
  warden:"#94a3b8", "incident-responder":"#ef4444"
};

function bldgPalette(accent, status){
  if(status==="locked"){
    return {wall:"#262b33", wallDark:"#1a1e25", roof:"#3a414b", win:"#14171c",
            door:"#14171c", line:"#39414c", accent:"#5b6573", glow:""};
  }
  if(status==="active"){
    return {wall:"#1c2b3b", wallDark:"#142433", roof:accent, win:"#ffe6a3",
            door:"#ffd766", line:accent, accent:accent, glow:accent};
  }
  // idle
  return {wall:"#172230", wallDark:"#101a26", roof:"#3c4a5e", win:"#0c141d",
          door:"#0c141d", line:"#28384c", accent:"#4a5870", glow:""};
}

// Per-agent shape builders. Each returns inner SVG markup for a 60x70 viewBox.
const BUILDING_SHAPES = {
  // Nexus — central castle/tower with side turrets, battlements + flag
  nexus:(p)=>`
    <rect x="5" y="32" width="12" height="34" fill="${p.wallDark}" stroke="${p.line}" stroke-width="1"/>
    <rect x="43" y="32" width="12" height="34" fill="${p.wallDark}" stroke="${p.line}" stroke-width="1"/>
    <rect x="5" y="29" width="3" height="4" fill="${p.roof}"/><rect x="11" y="29" width="3" height="4" fill="${p.roof}"/>
    <rect x="43" y="29" width="3" height="4" fill="${p.roof}"/><rect x="49" y="29" width="3" height="4" fill="${p.roof}"/>
    <rect x="20" y="16" width="20" height="50" fill="${p.wall}" stroke="${p.line}" stroke-width="1"/>
    <rect x="20" y="12" width="4" height="4" fill="${p.roof}"/><rect x="28" y="12" width="4" height="4" fill="${p.roof}"/><rect x="36" y="12" width="4" height="4" fill="${p.roof}"/>
    <rect x="29" y="2" width="2" height="10" fill="${p.accent}"/>
    <polygon points="31,3 31,9 38,6" fill="${p.accent}"/>
    <rect x="27" y="24" width="6" height="6" fill="${p.win}"/><rect x="27" y="36" width="6" height="6" fill="${p.win}"/>
    <rect x="8" y="40" width="6" height="6" fill="${p.win}"/><rect x="46" y="40" width="6" height="6" fill="${p.win}"/>
    <rect x="26" y="52" width="8" height="14" fill="${p.door}"/>`,

  // Sentinel — fortified guard tower, battlements, arrow-slits + shield
  sentinel:(p)=>`
    <rect x="10" y="58" width="40" height="8" fill="${p.wallDark}" stroke="${p.line}" stroke-width="1"/>
    <rect x="14" y="22" width="32" height="40" fill="${p.wall}" stroke="${p.line}" stroke-width="1"/>
    <rect x="13" y="17" width="5" height="5" fill="${p.roof}"/><rect x="22" y="17" width="5" height="5" fill="${p.roof}"/>
    <rect x="33" y="17" width="5" height="5" fill="${p.roof}"/><rect x="42" y="17" width="5" height="5" fill="${p.roof}"/>
    <rect x="22" y="28" width="4" height="9" fill="${p.win}"/><rect x="34" y="28" width="4" height="9" fill="${p.win}"/>
    <polygon points="30,40 36,42 36,48 30,52 24,48 24,42" fill="${p.wallDark}" stroke="${p.accent}" stroke-width="1"/>
    <rect x="26" y="56" width="8" height="10" fill="${p.door}"/>`,

  // Axiom — library/archive with columns + pediment
  axiom:(p)=>`
    <polygon points="6,30 30,16 54,30" fill="${p.roof}" stroke="${p.line}" stroke-width="1"/>
    <rect x="8" y="30" width="44" height="6" fill="${p.wallDark}" stroke="${p.line}" stroke-width="1"/>
    <rect x="10" y="36" width="40" height="24" fill="${p.wall}"/>
    <rect x="13" y="36" width="4" height="24" fill="${p.wallDark}"/><rect x="21" y="36" width="4" height="24" fill="${p.wallDark}"/>
    <rect x="29" y="36" width="4" height="24" fill="${p.wallDark}"/><rect x="37" y="36" width="4" height="24" fill="${p.wallDark}"/>
    <rect x="45" y="36" width="4" height="24" fill="${p.wallDark}"/>
    <rect x="17" y="40" width="4" height="16" fill="${p.win}"/><rect x="33" y="40" width="4" height="16" fill="${p.win}"/>
    <rect x="6" y="60" width="48" height="3" fill="${p.wallDark}"/><rect x="3" y="63" width="54" height="3" fill="${p.line}"/>`,

  // Pyro — workshop/forge with chimney + glowing forge door
  pyro:(p)=>`
    <rect x="40" y="10" width="8" height="20" fill="${p.wallDark}" stroke="${p.line}" stroke-width="1"/>
    <circle cx="44" cy="8" r="2" fill="${p.accent}" opacity=".5"/><circle cx="46" cy="4" r="2.5" fill="${p.accent}" opacity=".3"/>
    <polygon points="6,30 30,18 54,30" fill="${p.roof}" stroke="${p.line}" stroke-width="1"/>
    <rect x="10" y="30" width="40" height="36" fill="${p.wall}" stroke="${p.line}" stroke-width="1"/>
    <rect x="14" y="36" width="7" height="7" fill="${p.win}"/><rect x="39" y="36" width="7" height="7" fill="${p.win}"/>
    <rect x="22" y="44" width="16" height="22" fill="${p.door}"/>
    <rect x="24" y="48" width="12" height="16" fill="${p.win}"/>`,

  // Quant — observatory with dome + telescope slit
  quant:(p)=>`
    <path d="M16 30 A14 14 0 0 1 44 30 Z" fill="${p.roof}" stroke="${p.line}" stroke-width="1"/>
    <rect x="28" y="16" width="4" height="14" fill="${p.win}"/>
    <rect x="14" y="30" width="32" height="36" fill="${p.wall}" stroke="${p.line}" stroke-width="1"/>
    <rect x="19" y="36" width="6" height="6" fill="${p.win}"/><rect x="35" y="36" width="6" height="6" fill="${p.win}"/>
    <rect x="19" y="48" width="6" height="6" fill="${p.win}"/><rect x="35" y="48" width="6" height="6" fill="${p.win}"/>

function buildingSVG(id, status){
  const accent = BUILDING_ACCENTS[id] || "#22d3ee";
  // Forge is always a locked ruin regardless of stored status.
  const st = (id==="forge") ? "locked" : status;
  const p = bldgPalette(accent, st);
  const shape = BUILDING_SHAPES[id] || BUILDING_SHAPES.nexus;
  const glow = p.glow ? `filter:drop-shadow(0 0 4px ${p.glow})` : "";
  return `<svg class="bsvg" viewBox="0 0 60 70" width="60" height="70" `+
         `xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" `+
         `style="${glow}">${shape(p)}</svg>`;
}

// Swap a single building's state when its status changes (no full reload).
// The detail panel still uses the inline SVG; the map is repainted by Phaser.
function swapBuildingState(id, status){
  const a = AGENTS.find(x=>x.id===id);
  if(a) a.status = status;
  if(mapScene) mapScene.setAgents(AGENTS, SELECTED);
}

// ── HTTP helpers (session-cookie auth gate) ──────────────────────────────
async function apiGet(url){
  const r = await fetch(url, {credentials:"include"});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPost(url, body){
  const r = await fetch(url, {
    method:"POST", credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body||{})
  });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2200);
}

function tickClock(){
  const el=document.getElementById("stat-time");
  if(el) el.textContent=new Date().toLocaleTimeString("en-GB",{hour12:false});
}
setInterval(tickClock,1000); tickClock();

// ── Load ─────────────────────────────────────────────────────────────────
async function loadAgents(){
  try{
    const d = await apiGet("/api/agents");
    AGENTS = d.agents||[]; LIVE = d.live||{};
    renderTopBar(); renderAlerts(d.alerts||[]); renderMap(); renderLiveStrip();
    if(!SELECTED && AGENTS.length) SELECTED = AGENTS[0].id;
    if(SELECTED) selectAgent(SELECTED, false);
  }catch(e){ toast("LINK DOWN"); }
}

}

// ── Findings synthesis (Sentinel / Axiom) ────────────────────────────────
function severityBreakdown(n){
  n=n||0;
  const crit=Math.round(n*0.12), high=Math.round(n*0.23), med=Math.round(n*0.32);
  const low=Math.max(0, n-crit-high-med);
  return {critical:crit, high:high, medium:med, low:low};
}

  const showFindings = (a.id==="sentinel"||a.id==="axiom");
  const showLive = (a.id==="quant");
  const sev = severityBreakdown(a.findings);
  const t = LIVE.trading||{};
  const locked = a.status==="locked";

  let html = `
    <div class="d-head">

    <div class="xp-sub">${a.xp} / ${a.xp_max} XP to next level</div>

    <div class="grid4">
      <div class="cell"><div class="k">Tasks Run</div><div class="v">${a.tasks_run||0}</div></div>

  if(showFindings){
    html += `
      <div class="sub-h">Findings by Severity</div>
      <div class="findings">
        <span class="fbadge critical">CRITICAL<span class="n">${sev.critical}</span></span>
        <span class="fbadge high">HIGH<span class="n">${sev.high}</span></span>

    const pnl=t.pnl, pnlClass=(pnl==null)?"":(parseFloat(pnl)>=0?"pos":"neg");
    html += `
      <div class="sub-h">Live Trading Data ${t.cached?'<span class="muted" style="font-size:.5rem">(cached)</span>':''}</div>

      </div>`;
  }

  html += `<div class="sub-h">Activity Log</div>`;

    html += `<div class="log">` + logs.slice(0,10).map(l=>`
      <div class="log-item">

// ── Actions ──────────────────────────────────────────────────────────────
async function doXp(id){
  try{
    const r = await apiPost(`/api/agents/${id}/xp`, {amount:50, message:"⚡ Manual XP boost"});
    toast(r.leveled_up?`${id.toUpperCase()} LEVELED UP!`:"+50 XP");
    await loadAgents();
  }catch(e){ toast("FAILED"); }
}
async function doDeploy(id){
  try{
    const a=AGENTS.find(x=>x.id===id);
    if(a && a.status==="idle") await apiPost(`/api/agents/${id}/status`,{status:"active"});
    await apiPost(`/api/agents/${id}/log`, {message:"🚀 Deployed to a task", xp_earned:0});
    const r = await apiPost(`/api/agents/${id}/xp`, {amount:25, message:"🚀 Deployment complete"});
    toast(r.leveled_up?`${id.toUpperCase()} LEVELED UP!`:"DEPLOYED +25 XP");
    await loadAgents();
  }catch(e){ toast("FAILED"); }
}
async function doToggle(id){
  try{
    const a=await apiPost(`/api/agents/${id}/status`,{});
    if(a.status) swapBuildingState(id, a.status); // instant SVG state swap
    toast("STATUS → "+(a.status||"").toUpperCase());
    await loadAgents();
  }
  catch(e){ toast("FAILED"); }
}
async function doBattle(id){
  // pick a random non-locked opponent
  const opps = AGENTS.filter(a=>a.id!==id && a.status!=="locked");
  if(!opps.length){ toast("NO OPPONENTS"); return; }
  const opp = opps[Math.floor(Math.random()*opps.length)];
  const topics=["code quality","architecture","performance","security posture","test coverage"];
  const topic=topics[Math.floor(Math.random()*topics.length)];
  try{
    const r = await apiPost("/api/battles", {agent1_id:id, agent2_id:opp.id, winner_id:id, topic});
    toast(`${id.toUpperCase()} BEAT ${opp.id.toUpperCase()} · +${r.xp_awarded} XP`);
    await loadAgents();
  }catch(e){ toast("BATTLE FAILED"); }
}

async function completeMission(id, alreadyDone){
  if(alreadyDone){ toast("ALREADY DONE"); return; }
  try{
    const r = await apiPost(`/api/missions/${id}/complete`, {});
    if(r.award && r.award.leveled_up) toast("MISSION DONE · LEVEL UP!");
    else toast("MISSION COMPLETE");
    await loadMissions(); await loadAgents();
  }catch(e){ toast("FAILED"); }
}

// ── Util ─────────────────────────────────────────────────────────────────
function fmtTs(ts){
  if(!ts) return "—";
  try{
    const d=new Date(ts.includes("T")?ts:ts.replace(" ","T")+"Z");
    if(isNaN(d)) return ts.slice(0,16);
    const diffM=(Date.now()-d)/60000;
    if(diffM<1) return "now";
    if(diffM<60) return Math.floor(diffM)+"m";
    if(diffM<1440) return Math.floor(diffM/60)+"h";
    return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
  }catch(e){ return "—"; }
}

  ledger:               {x:720, y:230, cols:2, rows:2, frames:[66,67,77,78],   accent:0x34d399, feat:"ledger"},
  "auto-docs":          {x:300, y:60,  cols:2, rows:2, frames:[3,4,14,15],     accent:0xfbbf24, feat:"auto-docs"},
  warden:               {x:580, y:230, cols:2, rows:2, frames:[0,1,11,12],     accent:0x94a3b8, feat:"warden"},
  "incident-responder": {x:180, y:340, cols:2, rows:2, frames:[68,69,79,80],   accent:0xef4444, feat:"incident-responder"}
};

// 16px dirt stubs linking each building to the trunk road (#2d1f0e).
const PATH_RECTS = [
  {x:84,  y:124, w:16, h:68},   // sentinel ↓ road
  {x:600, y:156, w:16, h:36},   // axiom    ↓ road
  {x:744, y:124, w:16, h:68},   // pixel    ↓ road
  {x:410, y:176, w:16, h:16},   // nexus    ↓ road
  {x:84,  y:224, w:16, h:56},   // pyro     ↑ road
  {x:284, y:224, w:16, h:56},   // forge    ↑ road
  {x:584, y:224, w:16, h:56},   // quant    ↑ road
  {x:744, y:224, w:16, h:56}    // ghost    ↑ road
];

// Scattered cypress trees (tileset frame 0). Pixel positions dodge roads/buildings.
const TREE_POS = [
  {x:140,y:80},{x:220,y:80},{x:140,y:340},{x:220,y:340},{x:480,y:80},{x:480,y:340},
  {x:640,y:80},{x:640,y:340},{x:80,y:160},{x:750,y:160},{x:80,y:400},{x:750,y:400}
];

function cssHex(n){ return "#" + (n >>> 0 & 0xffffff).toString(16).padStart(6,"0"); }

class MapScene extends Phaser.Scene {
  constructor(){ super("map"); }

  preload(){
    this.load.image("grass",  "/static/grass-tile.png");
    this.load.image("grass2", "/static/grass-tile-2.png");
    this.load.image("grass3", "/static/grass-tile-3.png");
    this.load.spritesheet("tiles", "/static/tiles-map.png", {frameWidth:32, frameHeight:32});
    this.load.spritesheet("hero",  "/static/hero.png",      {frameWidth:32, frameHeight:48});
  }

  create(){
    mapScene = this;
    window.mapScene = this;          // external JS (selectAgent / state swaps) hooks in here
    this.buildings = {};
    this.drawGround();
    this.drawRoads();
    this.drawDecor();
    this.placeHero();
    this.selGfx = this.add.graphics().setDepth(20);
    if(pendingAgents){ this.setAgents(pendingAgents, pendingSelected); pendingAgents = null; }
  }

  // ── Ground: seamless grass tiles, seeded per position + dirt stubs ──────
  drawGround(){
    const keys = ["grass","grass2","grass3"];
    for(let col=0; col<=MAP_COLS; col++){
      for(let row=0; row<=MAP_ROWS; row++){
        const k = keys[(col*31 + row*7) % 3];   // seeded so the layout is stable
        this.add.image(col*TILE, row*TILE, k)
          .setOrigin(0,0).setDisplaySize(TILE, TILE).setDepth(0);
      }
    }
    const g = this.add.graphics().setDepth(1);
    g.fillStyle(0x2d1f0e, 1);
    PATH_RECTS.forEach(p=> g.fillRect(p.x, p.y, p.w, p.h));
  }

  // ── Roads: trunk H+V, lighter crossroad, dashed centre lines ───────────
  drawRoads(){
    const g = this.add.graphics().setDepth(2);
    g.fillStyle(0x1a2332, 1);
    g.fillRect(0, 192, 840, 32);     // horizontal (rows 6–7)
    g.fillRect(400, 0, 32, 460);     // vertical (cols 12–13)
    g.fillStyle(0x222d3d, 1);
    g.fillRect(400, 192, 32, 32);    // crossroad (lighter)
    g.fillStyle(0x374151, 1);
    for(let x=0; x<840; x+=24){ g.fillRect(x, 207, 12, 2); }   // H dashes @ y=208
    for(let y=0; y<460; y+=24){ g.fillRect(415, y, 2, 12); }   // V dashes @ x=416
  }

  // ── Decor: cypress trees + well at the crossroad ───────────────────────
  drawDecor(){
    TREE_POS.forEach(t=>
      this.add.sprite(t.x, t.y, "tiles", 0).setOrigin(0,0).setDepth(3));
    // well (frame 71) centred on the intersection
    this.add.sprite(416, 208, "tiles", 71).setOrigin(0.5).setDepth(3);
  }

  // ── Hero idles at the HQ crossroad ─────────────────────────────────────
  placeHero(){
    this.hero = this.add.sprite(416, 200, "hero", 0).setOrigin(0.5, 1).setDepth(16);
    const frameCount = this.textures.get("hero").frameTotal - 1;   // minus __BASE
    if(frameCount >= 3 && !this.anims.exists("hero-idle")){
      this.anims.create({
        key:"hero-idle",
        frames:this.anims.generateFrameNumbers("hero", {start:0, end:2}),
        frameRate:4, repeat:-1
      });
      this.hero.play("hero-idle");
    }
  }

  // ── Buildings ──────────────────────────────────────────────────────────
  setAgents(agents, selected){
    this.clearBuildings();
    agents.forEach(a=>{
      const def = BUILDING_DEFS[a.id];
      if(!def) return;
      const status = (a.id === "forge") ? "locked" : a.status;
      this.buildings[a.id] = this.buildBuilding(a, def, status);
    });
    this.setSelected(selected != null ? selected : SELECTED);
  }

  clearBuildings(){
    Object.values(this.buildings).forEach(c=>{
      if(c._stateTween) c._stateTween.stop();
      if(c._flicker) c._flicker.remove();
      if(c._smoke) c._smoke.remove();
      this.tweens.killTweensOf(c);
      c.list.slice().forEach(ch=> this.tweens.killTweensOf(ch));
      c.destroy();
    });
    this.buildings = {};
    if(this.selGfx) this.selGfx.clear();
  }

  buildBuilding(a, def, status){
    const w = def.cols*TILE, h = def.rows*TILE;
    const hw = w/2, hh = h/2;
    const c = this.add.container(def.x + hw, def.y + hh).setDepth(10);
    c._def = def; c._w = w; c._h = h; c._name = (a.name || a.id);

    // tileset body (frames stamped left→right, top→bottom)
    const tiles = [];
    def.frames.forEach((fr, i)=>{
      const col = i % def.cols, row = Math.floor(i / def.cols);
      const sp = this.add.sprite(col*TILE - hw, row*TILE - hh, "tiles", fr).setOrigin(0,0);
      tiles.push(sp); c.add(sp);
    });
    c._tiles = tiles;

    // status overlay (border + tint fill) and lock icon
    c._overlay = this.add.graphics(); c.add(c._overlay);
    c._lock = this.add.graphics(); c.add(c._lock);

    // nexus transmission antenna (always pulsing above HQ)
    if(def.feat === "nexus"){
      const ant = this.add.container(0, -hh);
      const ag = this.add.graphics();
      ag.fillStyle(0x9ca3af, 1); ag.fillRect(-1, -16, 2, 16);
      ag.fillStyle(def.accent, 1); ag.fillCircle(0, -16, 3);
      ant.add(ag); c.add(ant);
      this.tweens.add({targets:ant, scaleY:{from:0.95, to:1.05},
        duration:1600, yoyo:true, repeat:-1, ease:"Sine.easeInOut"});
    }

    // level badge (top-right)
    const bw = 26;
    const badge = this.add.graphics();
    badge.fillStyle(status === "locked" ? 0x374151 : def.accent, 1);
    badge.fillRect(hw - bw, -hh, bw, 12);
    c.add(badge);
    c.add(this.add.text(hw - bw/2, -hh + 6, "LV " + (a.level||0),
      {fontFamily:"monospace", fontSize:"8px", color:"#0b131c"}).setOrigin(0.5));

    // name label (below building)
    c._label = this.add.text(0, hh + 4, (a.name||a.id).toUpperCase(),
      {fontFamily:"monospace", fontSize:"11px", color:"#e2e8f0"}).setOrigin(0.5, 0);
    c.add(c._label);

    // hover brighten overlay (top of stack)
    c._hoverOv = this.add.graphics(); c.add(c._hoverOv);

    // interactivity (hit area covers building + label)
    c.setInteractive(new Phaser.Geom.Rectangle(-hw, -hh, w, h + 18),
      Phaser.Geom.Rectangle.Contains);
    c.on("pointerover", ()=>{
      this.input.setDefaultCursor(c._locked ? "not-allowed" : "pointer");
      this.tweens.add({targets:c, scaleX:1.05, scaleY:1.05, duration:120});
      c._hoverOv.clear();
      c._hoverOv.fillStyle(0xffffff, 0.1); c._hoverOv.fillRect(-hw, -hh, w, h);
    });
    c.on("pointerout", ()=>{
      this.input.setDefaultCursor("default");
      this.tweens.add({targets:c, scaleX:1, scaleY:1, duration:120});
      c._hoverOv.clear();
    });
    c.on("pointerdown", ()=>{
      if(c._locked){ toast(c._name.toUpperCase() + " is locked"); return; }
      selectAgent(a.id, true);
      this.setSelected(a.id);
    });

    this.applyState(c, status);
    return c;
  }

  // ── Per-status overlay / glow / tint / animation ───────────────────────
  applyState(c, status){
    const def = c._def, hw = c._w/2, hh = c._h/2;
    const locked = status === "locked";
    const active = status === "active";
    c._locked = locked;

    // tear down any prior state animation
    if(c._stateTween){ c._stateTween.stop(); c._stateTween = null; }
    if(c._flicker){ c._flicker.remove(); c._flicker = null; }
    if(c._smoke){ c._smoke.remove(); c._smoke = null; }

    // tint tiles when locked
    c._tiles.forEach(t=> locked ? t.setTint(0x333333) : t.clearTint());

    // border + subtle fill
    const ov = c._overlay; ov.clear(); ov.alpha = 1;
    if(active){
      ov.fillStyle(def.accent, 0.08); ov.fillRect(-hw, -hh, c._w, c._h);
      ov.lineStyle(2, def.accent, 1.0); ov.strokeRect(-hw, -hh, c._w, c._h);
    } else if(!locked){
      ov.lineStyle(1, 0x374151, 0.5); ov.strokeRect(-hw, -hh, c._w, c._h);
    }

    // lock icon (body 8×6 + arc shackle)
    const lg = c._lock; lg.clear();
    if(locked){
      lg.fillStyle(0xffffff, 1); lg.fillRect(-4, 0, 8, 6);
      lg.lineStyle(2, 0xffffff, 1);
      lg.beginPath();
      lg.arc(0, 0, 4, Phaser.Math.DegToRad(180), Phaser.Math.DegToRad(360), false);
      lg.strokePath();
    }

    // label colour by state
    c._label.setColor(locked ? "#64748b" : active ? cssHex(def.accent) : "#94a3b8");

    // active: pulsing border + occasional flicker (+ smoke for pyro)
    if(active){
      c._stateTween = this.tweens.add({targets:ov, alpha:{from:0.6, to:1.0},
        duration:2000, yoyo:true, repeat:-1, ease:"Sine.easeInOut"});
      c._flicker = this.time.addEvent({delay:Phaser.Math.Between(3000,8000), loop:true,
        callback:()=>{
          if(!c.active || !c._overlay) return;
          if(c._stateTween) c._stateTween.pause();
          this.tweens.add({targets:ov, alpha:0.3, duration:70, yoyo:true,
            onComplete:()=>{ if(c._stateTween) c._stateTween.resume(); }});
        }});
      if(def.feat === "pyro") this.startSmoke(c);
    }
  }

  startSmoke(c){
    const sx = -c._w/2 + 48, sy = -c._h/2 + 8;   // chimney, relative to building
    c._smoke = this.time.addEvent({delay:550, loop:true, callback:()=>{
      if(!c.active) return;
      const puff = this.add.circle(sx, sy, 2 + Math.random()*2, 0xb0b7c3, 0.5);
      c.add(puff);
      this.tweens.add({targets:puff, y:sy - 30, x:sx + (Math.random()*12 - 6),
        alpha:0, scale:2, duration:1700, ease:"Sine.easeOut",
        onComplete:()=> puff.destroy()});
    }});
  }

  // Update a single building's state without rebuilding the map.
  setBuildingState(id, status){
    const c = this.buildings[id];
    if(!c) return;
    this.applyState(c, id === "forge" ? "locked" : status);
  }

  setSelected(id){
    if(!this.selGfx) return;
    this.selGfx.clear();
    const c = this.buildings[id];
    if(!c) return;
    const d = c._def;
    this.selGfx.lineStyle(2, 0xffffff, 0.8);
    this.selGfx.strokeRect(d.x - 3, d.y - 3, c._w + 6, c._h + 6);
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  parent: "phaser-map",
  width: 840, height: 460,
  backgroundColor: "#0c141d",
  pixelArt: true,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: MapScene
});

// ── Boot ─────────────────────────────────────────────────────────────────
loadAgents();
loadMissions();
setInterval(loadAgents, 60000); // refresh live data each minute
</script>
</body>
