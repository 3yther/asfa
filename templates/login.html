<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000408">
<title>ASFA // LOCKED</title>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --cyan:#00d9ff; --bg:#000408; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 30%, #06121c 0%, var(--bg) 70%);
    font-family:'JetBrains Mono','IBM Plex Mono',monospace; color:#cfe9f2;
  }
  .lock {
    width:min(360px,90vw); padding:34px 30px; border:1px solid rgba(0,217,255,.25);
    border-radius:14px; background:rgba(4,12,20,.72);
    box-shadow:0 0 40px rgba(0,217,255,.08), inset 0 0 30px rgba(0,217,255,.04);
    text-align:center;
  }
  .title { font-weight:700; letter-spacing:.32em; font-size:20px; color:var(--cyan); margin-bottom:4px; }
  .sub { font-size:11px; letter-spacing:.18em; color:#5f7a85; margin-bottom:26px; text-transform:uppercase; }
  input[type=password] {
    width:100%; padding:13px 14px; margin-bottom:14px; background:#020a10;
    border:1px solid rgba(0,217,255,.3); border-radius:8px; color:#e8f7fc;
    font-family:inherit; font-size:14px; letter-spacing:.08em; outline:none;
  }
  input[type=password]:focus { border-color:var(--cyan); box-shadow:0 0 0 2px rgba(0,217,255,.18); }
  button {
    width:100%; padding:13px; background:linear-gradient(180deg,#00d9ff,#0095b3);
    border:none; border-radius:8px; color:#001016; font-family:inherit; font-weight:700;
    letter-spacing:.2em; font-size:13px; cursor:pointer; text-transform:uppercase;
  }
  button:hover { filter:brightness(1.1); }
  .err { color:#ff5d6c; font-size:12px; letter-spacing:.05em; margin-bottom:14px; min-height:16px; }
</style>
</head>
<body>
  <form class="lock" method="POST" action="{{ url_for('login', next=next_url) }}">
    <div class="title">[ ASFA ]</div>
    <div class="sub">Access Restricted</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <input type="password" name="password" placeholder="passphrase" autofocus autocomplete="current-password">
    <button type="submit">Unlock</button>
  </form>
</body>
</html>
